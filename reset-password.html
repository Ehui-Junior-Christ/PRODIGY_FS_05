<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialiser le mot de passe - Prisme</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-color);
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
        }
        .container {
            background: var(--panel-bg);
            padding: 32px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        h2 { margin-top: 0; margin-bottom: 24px; font-size: 22px; }
        p { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; text-align: left; }
        .input-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
        .input-field { width: 100%; box-sizing: border-box; }
        .success-msg { color: #2ed573; margin-top: 16px; font-weight: bold; display: none; }
        .error-msg { color: #ff4757; margin-top: 16px; font-weight: bold; display: none; }
    </style>
</head>
<body class="auth-pending">
    <div class="container">
        <h2>Nouveau mot de passe</h2>
        <p>Veuillez entrer votre nouveau mot de passe ci-dessous.</p>

        <form id="reset-form">
            <div class="input-group">
                <label for="new-password">Nouveau mot de passe</label>
                <input type="password" id="new-password" class="input-field" placeholder="Votre nouveau mot de passe" required minlength="6">
            </div>
            <button type="submit" class="btn-primary" style="width:100%; margin-top:8px;">Réinitialiser</button>
        </form>

        <div id="loading" style="display:none; margin-top:16px;">
            <i class="ph ph-spinner ph-spin" style="font-size:24px; color:var(--accent-color);"></i>
        </div>
        <div id="success" class="success-msg">Mot de passe réinitialisé ! Vous allez être redirigé...</div>
        <div id="error" class="error-msg"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('reset-form').style.display = 'none';
            document.getElementById('error').textContent = 'Lien invalide. Aucun jeton fourni.';
            document.getElementById('error').style.display = 'block';
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            if (newPassword.length < 6) return;

            document.getElementById('reset-form').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';

            try {
                const res = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                
                document.getElementById('loading').style.display = 'none';
                const data = await res.json();
                
                if (res.ok) {
                    document.getElementById('success').style.display = 'block';
                    setTimeout(() => window.location.href = 'index.html', 3000);
                } else {
                    document.getElementById('error').textContent = data.error || 'Erreur lors de la réinitialisation.';
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('reset-form').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = 'Erreur serveur. Veuillez réessayer.';
                document.getElementById('error').style.display = 'block';
                document.getElementById('reset-form').style.display = 'block';
            }
        });
    </script>
</body>
</html>
