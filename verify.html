<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vérification e-mail — Prisme</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(20,20,20,0.8);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 48px;
      max-width: 440px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(24px);
    }
    .logo { font-size: 24px; font-weight: 800; margin-bottom: 32px; letter-spacing: -0.5px; }
    .icon-circle {
      width: 80px; height: 80px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }
    .icon-circle.success { background: rgba(46,213,115,0.1); border: 1px solid rgba(46,213,115,0.2); color: #2ed573; }
    .icon-circle.error   { background: rgba(255,71,87,0.1);  border: 1px solid rgba(255,71,87,0.2);  color: #ff4757; }
    .icon-circle.loading { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #888; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
    p  { color: #888; font-size: 15px; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      background: #fff; color: #000;
      font-weight: 700; font-size: 15px;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 50px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin 1s linear infinite; display: inline-block; }
  </style>
</head>
<body class="auth-pending">
  <div class="card">
    <div class="logo"><i class="ph ph-triangle"></i> Prisme</div>
    <div class="icon-circle loading" id="icon">
      <i class="ph ph-circle-notch spinning"></i>
    </div>
    <h1 id="title">Vérification en cours…</h1>
    <p id="message">Veuillez patienter pendant que nous confirmons votre adresse e-mail.</p>
    <div id="action"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    async function verify() {
      if (!token) return showError('Lien de vérification invalide.');

      try {
        const res = await fetch(`http://localhost:3000/api/auth/verify?token=${token}`);
        const data = await res.json();

        if (res.ok) {
          document.getElementById('icon').className = 'icon-circle success';
          document.getElementById('icon').innerHTML = '<i class="ph-fill ph-check-circle"></i>';
          document.getElementById('title').textContent = 'E-mail vérifié !';
          document.getElementById('message').textContent = 'Votre compte est maintenant actif. Vous pouvez vous connecter à Prisme.';
          document.getElementById('action').innerHTML = '<a href="index.html" class="btn"><i class="ph ph-arrow-right"></i> Aller sur Prisme</a>';
        } else {
          showError(data.error || 'Lien invalide ou expiré.');
        }
      } catch (e) {
        showError('Impossible de contacter le serveur. Assurez-vous que le backend est démarré.');
      }
    }

    function showError(msg) {
      document.getElementById('icon').className = 'icon-circle error';
      document.getElementById('icon').innerHTML = '<i class="ph-fill ph-x-circle"></i>';
      document.getElementById('title').textContent = 'Lien invalide';
      document.getElementById('message').textContent = msg;
      document.getElementById('action').innerHTML = '<a href="index.html" class="btn" style="background:#ff4757;color:#fff;">Retour à l\'accueil</a>';
    }

    verify();
  </script>
</body>
</html>
